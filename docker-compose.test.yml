version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: daatan-postgres-test
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=daatan_test
      - POSTGRES_PASSWORD=daatan_test
      - POSTGRES_DB=daatan_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daatan_test -d daatan_test"]
      interval: 5s
      timeout: 5s
      retries: 5
