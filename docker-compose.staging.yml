services:
  nginx:
    image: nginx:alpine
    container_name: daatan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx-staging-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app-staging
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "--header=Host: localhost", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-staging:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_ENV=staging
        - DATABASE_URL=postgresql://daatan:${POSTGRES_PASSWORD}@postgres-staging:5432/daatan_staging
        - NEXTAUTH_URL=https://staging.daatan.com
    image: ${ECR_REGISTRY:-272007598366.dkr.ecr.eu-central-1.amazonaws.com}/daatan-app:staging-latest
    container_name: daatan-app-staging
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - APP_ENV=staging
      - DATABASE_URL=postgresql://daatan:${POSTGRES_PASSWORD}@postgres-staging:5432/daatan_staging
      - NEXT_PUBLIC_ENV=staging
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://staging.daatan.com
      - AUTH_TRUST_HOST=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - SCRAPINGBEE_API_KEY=${SCRAPINGBEE_API_KEY}
      - BRIGHTDATA_API_KEY=${BRIGHTDATA_API_KEY}
      - NIMBLEWAY_API_KEY=${NIMBLEWAY_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID_STAGING}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - BOT_RUNNER_SECRET=${BOT_RUNNER_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-Daatan <noreply@daatan.com>}
      - MAX_BOTS=${MAX_BOTS:-50}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION}
      - ORACLE_URL=${ORACLE_URL}
      - ORACLE_API_KEY=${ORACLE_API_KEY}
    depends_on:
      postgres-staging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-next:
    image: ${ECR_REGISTRY:-272007598366.dkr.ecr.eu-central-1.amazonaws.com}/daatan-app:next-latest
    container_name: daatan-app-next
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - APP_ENV=next
      - DATABASE_URL=postgresql://daatan:${POSTGRES_PASSWORD}@postgres-staging:5432/daatan_staging
      - NEXT_PUBLIC_ENV=staging
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://next.daatan.com
      - AUTH_TRUST_HOST=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - SCRAPINGBEE_API_KEY=${SCRAPINGBEE_API_KEY}
      - BRIGHTDATA_API_KEY=${BRIGHTDATA_API_KEY}
      - NIMBLEWAY_API_KEY=${NIMBLEWAY_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID_STAGING}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - BOT_RUNNER_SECRET=${BOT_RUNNER_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-Daatan <noreply@daatan.com>}
      - MAX_BOTS=${MAX_BOTS:-50}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION}
      - ORACLE_URL=${ORACLE_URL}
      - ORACLE_API_KEY=${ORACLE_API_KEY}
    depends_on:
      postgres-staging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-staging:
    image: pgvector/pgvector:pg16
    container_name: daatan-postgres-staging
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=daatan
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=daatan_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U daatan -d daatan_staging" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: daatan-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_staging_data:
