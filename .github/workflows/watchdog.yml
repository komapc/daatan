name: Health Watchdog

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    name: Check ${{ matrix.env.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - name: production
            base_url: https://daatan.com
          - name: staging
            base_url: https://staging.daatan.com

    steps:
      - name: Check pages
        id: checks
        run: |
          BASE="${{ matrix.env.base_url }}"
          FAILED=()

          check() {
            local label="$1" url="$2" expect_key="${3:-}" expect_val="${4:-}"
            echo "Checking $label -> $url"

            # -w format: http_code then num_redirects on separate lines.
            # NOTE: no leading \n — body goes to file so stdout is only the -w trailer.
            # head -1 = http_code, tail -1 = num_redirects.
            HTTP_AND_REDIRECTS=$(curl -L --max-redirs 5 --max-time 15 \
              -w "%{http_code}\n%{num_redirects}" \
              -o /tmp/curl_body.txt \
              "$url" 2>/tmp/curl_err.txt)
            CURL_EXIT=$?

            # curl non-zero exit: map common codes to human-readable reasons
            if [ $CURL_EXIT -ne 0 ]; then
              ERR=$(head -1 /tmp/curl_err.txt)
              case $CURL_EXIT in
                6)  REASON="DNS resolution failed" ;;
                7)  REASON="connection refused" ;;
                28) REASON="timed out (>15s)" ;;
                35) REASON="SSL/TLS handshake failed" ;;
                47) REASON="too many redirects" ;;
                *)  REASON="curl error $CURL_EXIT" ;;
              esac
              echo "  FAIL $REASON: $ERR"
              FAILED+=("$label ($REASON)")
              return
            fi

            HTTP=$(echo "$HTTP_AND_REDIRECTS" | head -1)
            NUM_REDIRECTS=$(echo "$HTTP_AND_REDIRECTS" | tail -1)
            BODY=$(cat /tmp/curl_body.txt)

            # Any redirect from a canonical HTTPS URL is suspicious — flag it.
            # If we followed redirects and the final status is OK, that masks loops
            # like the 307-loop incident. Treat any redirect as a failure.
            if [ "$NUM_REDIRECTS" -gt 0 ]; then
              echo "  FAIL unexpected redirect(s) (count: $NUM_REDIRECTS, final HTTP $HTTP)"
              echo "  These URLs should be canonical HTTPS — any redirect indicates misconfiguration"
              FAILED+=("$label ($NUM_REDIRECTS redirect(s) — possible loop)")
              return
            fi

            if [[ "$HTTP" -lt 200 || "$HTTP" -ge 400 ]]; then
              SNIPPET=$(echo "$BODY" | head -c 120 | tr '\n' ' ')
              echo "  FAIL HTTP $HTTP — $SNIPPET"
              FAILED+=("$label (HTTP $HTTP)")
              return
            fi

            # For JSON endpoints: validate a key=value pair
            if [[ -n "$expect_key" ]]; then
              if ! echo "$BODY" | grep -qE "\"$expect_key\":(\"$expect_val\"|$expect_val)"; then
                SNIPPET=$(echo "$BODY" | head -c 200 | tr '\n' ' ')
                echo "  FAIL expected $expect_key=$expect_val — got: $SNIPPET"
                FAILED+=("$label ($expect_key≠$expect_val)")
                return
              fi
            fi

            echo "  OK (HTTP $HTTP)"
          }

          # API health + DB
          check "Health (app+db)" "$BASE/api/health" "status" "ok"
          check "Health DB flag"  "$BASE/api/health" "db" "true"

          # Public pages
          check "Homepage"      "$BASE"             ""
          check "Forecast feed" "$BASE/forecasts"   ""
          check "Leaderboard"   "$BASE/leaderboard" ""
          check "About/login"   "$BASE/auth/signin" ""

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            # Join with | so Telegram step can format as separate lines
            FAILURE_STR=$(printf '%s|' "${FAILED[@]}")
            echo "failures=${FAILURE_STR%|}" >> "$GITHUB_OUTPUT"
            printf '  FAIL %s\n' "${FAILED[@]}"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert via Telegram
        if: steps.checks.outputs.failed == 'true'
        run: |
          ENV="${{ matrix.env.name }}"
          FAILURES="${{ steps.checks.outputs.failures }}"
          # Format | -separated failures as a bullet list (| → %0A• )
          FAILURE_LINES=$(echo "$FAILURES" | sed 's/|/%0A• /g')
          MSG="🚨 <b>[$ENV] Health check FAILED</b>%0A%0A• ${FAILURE_LINES}%0A%0A<a href='${{ matrix.env.base_url }}/api/health'>View health endpoint</a>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"

      # Advisory-only: detect when production is running a version older than staging.
      # Notifies at most once per unique (prod, staging) version pair — subsequent
      # watchdog runs skip the Telegram alert until the versions change again.
      - name: Restore version-drift notification cache
        if: matrix.env.name == 'production'
        id: drift-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/drift-notified
          key: version-drift-notified-${{ hashFiles('/tmp/drift-key.txt') }}
          restore-keys: version-drift-notified-

      - name: Check version drift (prod vs staging)
        if: matrix.env.name == 'production'
        id: drift
        run: |
          # Helper: convert semver to a zero-padded integer for numeric comparison.
          # e.g. "1.7.140" -> "001007140"
          ver() { echo "$@" | awk -F. '{ printf("%d%03d%03d\n", $1,$2,$3); }'; }

          PROD_HEALTH=$(curl -s --max-time 5 "https://daatan.com/api/health" 2>/dev/null || echo "")
          STAGING_HEALTH=$(curl -s --max-time 5 "https://staging.daatan.com/api/health" 2>/dev/null || echo "")

          PROD_VER=$(echo "$PROD_HEALTH" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          STAGING_VER=$(echo "$STAGING_HEALTH" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$STAGING_VER" ]; then
            echo "Staging unreachable or version not found — skipping drift check"
            exit 0
          fi

          if [ -z "$PROD_VER" ]; then
            echo "Production version not found — skipping drift check"
            exit 0
          fi

          echo "Production version : $PROD_VER"
          echo "Staging version    : $STAGING_VER"

          DRIFT_KEY="prod-${PROD_VER}__staging-${STAGING_VER}"
          echo "$DRIFT_KEY" > /tmp/drift-key.txt

          if [ "$(ver "$STAGING_VER")" -gt "$(ver "$PROD_VER")" ]; then
            echo "Version drift detected: staging ($STAGING_VER) > production ($PROD_VER)"

            # Only notify if this exact (prod, staging) pair hasn't been notified before
            CACHED_KEY=$(cat /tmp/drift-notified 2>/dev/null || echo "")
            if [ "$CACHED_KEY" = "$DRIFT_KEY" ]; then
              echo "Already notified for this drift — skipping Telegram alert"
            else
              MSG="⚠️ [prod] Version drift: prod is running v$PROD_VER but staging has v$STAGING_VER — consider deploying to production"
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d "text=$MSG" \
                -d "parse_mode=HTML" \
                -d "disable_web_page_preview=true"
              echo "$DRIFT_KEY" > /tmp/drift-notified
              echo "save_cache=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No version drift — production is up to date"
          fi

      - name: Save version-drift notification cache
        if: matrix.env.name == 'production' && steps.drift.outputs.save_cache == 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/drift-notified
          key: version-drift-notified-${{ hashFiles('/tmp/drift-key.txt') }}
