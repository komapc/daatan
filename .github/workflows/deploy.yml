name: CI/CD Pipeline

env:
  ECR_REGISTRY: 272007598366.dkr.ecr.eu-central-1.amazonaws.com

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Target version tag (e.g. v1.1.1) for manual production deploy (optional)'
        required: false
        type: string

jobs:
  # Build and test (runs on all pushes and PRs)
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      app_version: ${{ steps.app_version.outputs.version }}
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "dummy-secret-for-build-long-enough-32-chars-!!"
          SKIP_ENV_VALIDATION: 1
        run: npm test

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build application
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "dummy-secret-for-build-long-enough-32-chars-!!"
          NEXTAUTH_URL: "http://localhost:3000"
          SKIP_ENV_VALIDATION: 1
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical || echo "⚠️ Audit found vulnerabilities — review before production deploy"

      - name: Check env var parity (blue-green-deploy.sh vs docker-compose.prod.yml)
        run: ./scripts/check-env-parity.sh

      # ECR Integration: Build and push Docker image (skip on PRs to save ECR storage)
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set app version for build
        if: github.event_name != 'pull_request'
        id: app_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            APP_VER="${GITHUB_REF#refs/tags/v}"
          else
            APP_VER="$(node -p "require('./package.json').version")"
          fi
          echo "version=$APP_VER" >> $GITHUB_OUTPUT
          echo "Using NEXT_PUBLIC_APP_VERSION=$APP_VER"

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/daatan-app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=staging-latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.app_version.outputs.version }},enable={{is_default_branch}}

      - name: Build and push to ECR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=272007598366.dkr.ecr.eu-central-1.amazonaws.com/daatan-app:buildcache
          cache-to: type=registry,ref=272007598366.dkr.ecr.eu-central-1.amazonaws.com/daatan-app:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.app_version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            DATABASE_URL=postgresql://placeholder
            NEXTAUTH_URL=https://daatan.com
            NEXT_PUBLIC_ENV=production
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

      - name: Build and push migrations image to ECR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: migrations
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/daatan-app:staging-latest-migrations
            ${{ steps.login-ecr.outputs.registry }}/daatan-app:${{ steps.app_version.outputs.version }}-migrations
          cache-from: type=registry,ref=272007598366.dkr.ecr.eu-central-1.amazonaws.com/daatan-app:buildcache
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.app_version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            DATABASE_URL=postgresql://placeholder
            NEXTAUTH_URL=https://daatan.com
            NEXT_PUBLIC_ENV=production
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

  # Deploy to STAGING (on push to main)
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Get source branch
        id: source_branch
        run: |
          MSG=$(git log -1 --pretty=%s)
          SOURCE=$(echo "$MSG" | grep -oP 'from [^/]+/\K[\w/._-]+' | head -1 || echo "")
          echo "name=${SOURCE:-main}" >> $GITHUB_OUTPUT

      - name: Check Instance SSM Health
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=staging" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text)

          echo "Instance $INSTANCE_ID PingStatus: $PING_STATUS"
          if [[ "$PING_STATUS" != "Online" ]]; then
            echo "❌ Error: Instance is $PING_STATUS. SSM command will fail. Please check or reboot the instance."
            exit 1
          fi

      - name: Deploy to Staging (SSM)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get Instance ID
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=staging" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "Found Staging Instance: $INSTANCE_ID"

          RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}"
          DEPLOY_FILES="scripts/blue-green-deploy.sh scripts/cleanup-docker-images.sh scripts/fetch-secrets.sh scripts/verify-health.sh scripts/verify-logs.sh scripts/verify-deploy.sh docker-compose.staging.yml infra/nginx/nginx-staging-ssl.conf"

          echo "🚀 Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_ID" \
            --comment "Deploy Staging ${{ github.sha }}" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "export HOME=/home/ubuntu",
              "export PATH=$PATH:/usr/local/bin:/usr/bin",
              "",
              "echo \"📦 Downloading deploy files from GitHub...\"",
              "mkdir -p ~/app/scripts ~/app/infra/nginx",
              "cd ~/app",
              "for f in '"$DEPLOY_FILES"'; do curl -sfL -H \"Authorization: token '"$GH_TOKEN"'\" \"'"$RAW_BASE"'/$f\" -o \"$f\" || { echo \"  ❌ Download failed: $f\"; exit 1; }; done; echo \"  ✅ All deploy files downloaded\"",
              "chmod +x scripts/*.sh",
              "",
              "echo \"🔄 Testing and reloading nginx config...\"",
              "docker exec daatan-nginx nginx -t && docker exec daatan-nginx nginx -s reload || true",
              "",
              "echo \"🔐 Logging in to ECR (Region: eu-central-1)...\"",
              "aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
              "",
              "echo \"🧹 Pruning old Docker images before pull...\"",
              "./scripts/cleanup-docker-images.sh 3 || echo \"  ⚠️ Cleanup failed (non-fatal, continuing)\"",
              "",
              "echo \"⬇️ Pulling staging image...\"",
              "docker pull '"$ECR_REGISTRY"'/daatan-app:staging-latest",
              "",
              "echo \"🏷️ Tagging image...\"",
              "docker tag '"$ECR_REGISTRY"'/daatan-app:staging-latest daatan-app:staging-latest",
              "",
              "echo \"⬇️ Pulling migrations image...\"",
              "docker pull '"$ECR_REGISTRY"'/daatan-app:staging-latest-migrations",
              "docker tag '"$ECR_REGISTRY"'/daatan-app:staging-latest-migrations daatan-migrations:staging-latest",
              "",
              "echo \"🚀 Executing blue-green deployment...\"",
              "export GIT_COMMIT='"${{ github.sha }}"'",
              "export SKIP_BUILD=true",
              "export NEXT_PUBLIC_APP_VERSION='"${{ needs.build.outputs.app_version }}"'",
              "./scripts/blue-green-deploy.sh staging"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait and verify staging deployment
        uses: ./.github/actions/ssm-deploy
        with:
          command-id: ${{ env.COMMAND_ID }}
          health-url: https://staging.daatan.com
          app-version: ${{ needs.build.outputs.app_version }}

      - name: Get merged PR info
        id: pr_info
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATA=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq 'if length > 0 then .[0] | "#\(.number) \(.title)|\(.html_url)" else "" end' 2>/dev/null || echo "")
          if [ -n "$DATA" ]; then
            echo "label=$(echo "$DATA" | cut -d'|' -f1)" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$DATA" | cut -d'|' -f2)" >> "$GITHUB_OUTPUT"
          else
            SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "label=commit $SHORT" >> "$GITHUB_OUTPUT"
            echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram - Staging Deployment Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ [staging] Deployment successful%0A%0Av${{ needs.build.outputs.app_version }} · ${{ steps.pr_info.outputs.label }}%0A%0A<a href=\"${{ steps.pr_info.outputs.url }}\">View changes →</a>" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

      - name: Notify Telegram - Staging Deployment Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ [staging] Deployment failed%0A%0Av${{ needs.build.outputs.app_version }} · ${{ steps.pr_info.outputs.label }}%0A%0A<a href=\"${{ steps.pr_info.outputs.url }}\">View changes →</a> · <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View logs →</a>" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

  # Deploy to PRODUCTION (on tag push only)
  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Get version from tag or input
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION=${{ github.event.inputs.version }}
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            echo "version=manual" >> $GITHUB_OUTPUT
          fi

      - name: Verify Staging Version matches or exceeds Production
        run: |
          PROD_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$PROD_VERSION" == "manual" ]]; then
            echo "Manual deployment, skipping version check."
            exit 0
          fi

          function ver { echo "$@" | awk -F. '{ printf("%d%03d%03d%03d\n", $1,$2,$3,$4); }'; }

          # Staging deploy races with the tag push — poll for up to 10 minutes
          # before giving up, so we never fail just because staging is still deploying.
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAGING_VERSION=$(curl -s --connect-timeout 5 https://staging.daatan.com/api/health | jq -r .version 2>/dev/null || echo "error")

            if [[ "$STAGING_VERSION" == "error" || "$STAGING_VERSION" == "null" ]]; then
              echo "⚠️ Could not reach staging (attempt $i/$MAX_ATTEMPTS), retrying in ${SLEEP_SECONDS}s..."
              sleep $SLEEP_SECONDS
              continue
            fi

            echo "Staging: $STAGING_VERSION  |  Target: $PROD_VERSION  (attempt $i/$MAX_ATTEMPTS)"

            if [ $(ver $PROD_VERSION) -le $(ver $STAGING_VERSION) ]; then
              echo "✅ Version check passed."
              exit 0
            fi

            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Staging not yet at $PROD_VERSION, retrying in ${SLEEP_SECONDS}s..."
              sleep $SLEEP_SECONDS
            fi
          done

          echo "❌ Staging did not reach v$PROD_VERSION after $((MAX_ATTEMPTS * SLEEP_SECONDS / 60)) minutes. Aborting."
          exit 1

      - name: Check Instance SSM Health
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=prod" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text)

          echo "Instance $INSTANCE_ID PingStatus: $PING_STATUS"
          if [[ "$PING_STATUS" != "Online" ]]; then
            echo "❌ Error: Instance is $PING_STATUS. SSM command will fail. Please check or reboot the instance."
            exit 1
          fi

      - name: Deploy to Production (SSM)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=prod" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "Found Production Instance: $INSTANCE_ID"

          # Determine Image Tag
          if [[ "${{ steps.version.outputs.version }}" != "manual" ]]; then
            IMAGE_TAG="${{ steps.version.outputs.version }}"
          else
            IMAGE_TAG="staging-latest"
          fi
          echo "Deploying Image Tag: $IMAGE_TAG"

          RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}"
          DEPLOY_FILES="scripts/blue-green-deploy.sh scripts/cleanup-docker-images.sh scripts/fetch-secrets.sh scripts/verify-health.sh scripts/verify-logs.sh scripts/verify-deploy.sh docker-compose.prod.yml infra/nginx/nginx-prod-ssl.conf"

          echo "🚀 Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_ID" \
            --comment "Deploy Production ${{ steps.version.outputs.version }}" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "export HOME=/home/ubuntu",
              "export PATH=$PATH:/usr/local/bin:/usr/bin",
              "",
              "echo \"📦 Downloading deploy files from GitHub...\"",
              "mkdir -p ~/app/scripts ~/app/infra/nginx",
              "cd ~/app",
              "for f in '"$DEPLOY_FILES"'; do curl -sfL -H \"Authorization: token '"$GH_TOKEN"'\" \"'"$RAW_BASE"'/$f\" -o \"$f\" || { echo \"  ❌ Download failed: $f\"; exit 1; }; done; echo \"  ✅ All deploy files downloaded\"",
              "chmod +x scripts/*.sh",
              "",
              "echo \"🔄 Testing and reloading nginx config...\"",
              "cp infra/nginx/nginx-prod-ssl.conf nginx-ssl.conf || true",
              "docker exec daatan-nginx nginx -t && docker exec daatan-nginx nginx -s reload || true",
              "",
              "echo \"🔐 Logging in to ECR (Region: eu-central-1)...\"",
              "aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
              "",
              "echo \"🧹 Pruning old Docker images before pull...\"",
              "./scripts/cleanup-docker-images.sh 3 || echo \"  ⚠️ Cleanup failed (non-fatal, continuing)\"",
              "",
              "echo \"⬇️ Pulling production image (tag: '"$IMAGE_TAG"')...\"",
              "docker pull '"$ECR_REGISTRY"'/daatan-app:'"$IMAGE_TAG"'",
              "",
              "echo \"🏷️ Tagging image as latest...\"",
              "docker tag '"$ECR_REGISTRY"'/daatan-app:'"$IMAGE_TAG"' daatan-app:latest",
              "",
              "echo \"⬇️ Pulling migrations image...\"",
              "docker pull '"$ECR_REGISTRY"'/daatan-app:'"$IMAGE_TAG"'-migrations",
              "docker tag '"$ECR_REGISTRY"'/daatan-app:'"$IMAGE_TAG"'-migrations daatan-migrations:latest",
              "",
              "echo \"🚀 Executing blue-green deployment...\"",
              "export GIT_COMMIT='"${{ github.sha }}"'",
              "export SKIP_BUILD=true",
              "export NEXT_PUBLIC_APP_VERSION='"${{ needs.build.outputs.app_version }}"'",
              "./scripts/blue-green-deploy.sh production"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait and verify production deployment
        uses: ./.github/actions/ssm-deploy
        with:
          command-id: ${{ env.COMMAND_ID }}
          health-url: https://daatan.com
          app-version: ${{ needs.build.outputs.app_version }}

      - name: Get merged PR info
        id: pr_info
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATA=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq 'if length > 0 then .[0] | "#\(.number) \(.title)|\(.html_url)" else "" end' 2>/dev/null || echo "")
          if [ -n "$DATA" ]; then
            echo "label=$(echo "$DATA" | cut -d'|' -f1)" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$DATA" | cut -d'|' -f2)" >> "$GITHUB_OUTPUT"
          else
            SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "label=commit $SHORT" >> "$GITHUB_OUTPUT"
            echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram - Production Deployment Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ [prod] Deployment successful%0A%0Av${{ steps.version.outputs.version }} · ${{ steps.pr_info.outputs.label }}%0A%0A<a href=\"${{ steps.pr_info.outputs.url }}\">View changes →</a>" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

      - name: Notify Telegram - Production Deployment Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ [prod] Deployment failed%0A%0Av${{ steps.version.outputs.version }} · ${{ steps.pr_info.outputs.label }}%0A%0A<a href=\"${{ steps.pr_info.outputs.url }}\">View changes →</a> · <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View logs →</a>" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"