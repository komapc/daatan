name: Database Backup

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
    - cron: '0 16 * * *'  # 16:00 UTC daily (RPO ≤ 12h)
  workflow_dispatch:

jobs:
  backup:
    name: Run DB backup
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger backup via SSM
        id: backup
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=prod" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "Instance: $INSTANCE_ID"

          SCRIPT=$(base64 -w 0 scripts/backup-db.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Scheduled DB backup $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --parameters "commands=[\"echo $SCRIPT | base64 -d > /tmp/backup-db.sh && bash /tmp/backup-db.sh\"]" \
            --output text \
            --query "Command.CommandId")
          echo "Command ID: $COMMAND_ID"

          # Wait up to 10 minutes
          for i in $(seq 1 60); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" --details \
              --query "CommandInvocations[0].Status" --output text)
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Backup completed"
              echo "status=success" >> "$GITHUB_OUTPUT"
              break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              OUTPUT=$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" --output text)
              echo "❌ Backup failed: $OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "output=$OUTPUT" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 10
          done

      - name: Verify backup restore via SSM
        if: steps.backup.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=prod" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "Instance: $INSTANCE_ID"

          RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}"

          # Fire-and-forget: the script sends its own Telegram alert on failure.
          # Restore can take a few minutes on large DBs — SSM timeout set to 10 min.
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_ID" \
            --comment "Backup restore verification $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "mkdir -p ~/app/scripts",
              "cd ~/app",
              "curl -sfL -H \"Authorization: token '"$GH_TOKEN"'\" \"'"$RAW_BASE"'/scripts/verify-backup.sh\" -o \"scripts/verify-backup.sh\"",
              "chmod +x scripts/verify-backup.sh",
              "./scripts/verify-backup.sh"
            ]' \
            --output text

      - name: Alert via Telegram on failure
        if: failure()
        run: |
          MSG="🚨 <b>DB Backup FAILED</b>%0ATime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML"
