name: Deploy to Next (Testbed)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    name: Build & Deploy to Next
    runs-on: ubuntu-latest
    environment: staging # Uses staging secrets
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: next-${{ github.run_id }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          docker build \
            --build-arg DATABASE_URL=$DATABASE_URL \
            --build-arg NEXTAUTH_URL=https://next.daatan.com \
            --build-arg NEXT_PUBLIC_ENV=staging \
            --build-arg NEXT_PUBLIC_APP_VERSION=$APP_VERSION \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_TIMESTAMP=$(date +%s) \
            -t $ECR_REGISTRY/daatan-app:$IMAGE_TAG \
            -t $ECR_REGISTRY/daatan-app:next-latest .
          docker push $ECR_REGISTRY/daatan-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/daatan-app:next-latest

      - name: Deploy to EC2 (Next Slot via SSM)
        env:
          GH_TOKEN: ${{ github.token }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Get Instance ID
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daatan-backend" "Name=tag:Environment,Values=staging" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "Found Staging Instance: $INSTANCE_ID"

          RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}"
          DEPLOY_FILES="scripts/blue-green-deploy.sh scripts/verify-health.sh scripts/verify-logs.sh scripts/verify-deploy.sh docker-compose.staging.yml infra/nginx/nginx-staging-ssl.conf"

          echo "🚀 Sending SSM Command..."
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_ID" \
            --comment "Deploy Next ${{ github.sha }}" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "export HOME=/home/ubuntu",
              "export PATH=$PATH:/usr/local/bin:/usr/bin",
              "",
              "echo \"📦 Downloading deploy files from GitHub...\"",
              "mkdir -p ~/app/scripts ~/app/infra/nginx",
              "cd ~/app",
              "for f in '"$DEPLOY_FILES"'; do curl -sfL -H \"Authorization: token '"$GH_TOKEN"'\" \"'"$RAW_BASE"'/$f\" -o \"$f\" || { echo \"  ❌ Download failed: $f\"; exit 1; }; done; echo \"  ✅ All deploy files downloaded\"",
              "chmod +x scripts/*.sh",
              "",
              "echo \"🔄 Testing and reloading nginx config...\"",
              "docker exec daatan-nginx nginx -t && docker exec daatan-nginx nginx -s reload || true",
              "",
              "echo \"🔐 Logging in to ECR (Region: eu-central-1)...\"",
              "aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
              "",
              "echo \"⬇️ Pulling next image...\"",
              "docker pull '"$ECR_REGISTRY"'/daatan-app:next-latest",
              "",
              "echo \"🏷️ Tagging image...\"",
              "docker tag '"$ECR_REGISTRY"'/daatan-app:next-latest daatan-app:next-latest",
              "",
              "echo \"🚀 Executing blue-green deployment...\"",
              "export GIT_COMMIT='"${{ github.sha }}"'",
              "export SKIP_BUILD=true",
              "./scripts/blue-green-deploy.sh next"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait and verify next deployment
        uses: ./.github/actions/ssm-deploy
        with:
          command-id: ${{ env.COMMAND_ID }}
          health-url: https://next.daatan.com
          app-version: ${{ env.APP_VERSION }}
